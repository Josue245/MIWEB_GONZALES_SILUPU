<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serie Fibonacci | MIWEB_GONZALES_SILUPU</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3d;
      --accent: #34d399;
      --accent2: #60a5fa;
      --text: #e8e8f0;
      --muted: #6b6b8a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(52,211,153,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(96,165,250,0.07) 0%, transparent 50%);
      pointer-events: none;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      z-index: 10;
    }
    .nav-brand { font-size: 0.75rem; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.1em; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      font-size: 0.8rem; color: var(--muted); text-decoration: none;
      font-family: 'Space Mono', monospace; letter-spacing: 0.05em; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }

    .container {
      width: 100%; max-width: 600px;
      padding: 2rem;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tag {
      display: inline-block;
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--accent); border: 1px solid rgba(52,211,153,0.3);
      padding: 0.25rem 0.75rem; border-radius: 2rem;
      margin-bottom: 1.5rem; letter-spacing: 0.1em;
    }
    h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; line-height: 1.1; margin-bottom: 0.5rem; }
    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2.5rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
    }
    .input-group { margin-bottom: 1.25rem; }
    label {
      display: block; font-size: 0.72rem;
      font-family: 'Space Mono', monospace; color: var(--muted);
      letter-spacing: 0.1em; margin-bottom: 0.5rem;
    }
    input[type="number"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.85rem 1rem; color: var(--text);
      font-family: 'Space Mono', monospace; font-size: 1.1rem;
      outline: none; transition: border-color 0.2s;
    }
    input[type="number"]:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px; color: #000;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.95rem; letter-spacing: 0.05em; cursor: pointer;
      margin-top: 0.5rem; transition: opacity 0.2s, transform 0.15s;
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .result {
      margin-top: 1.5rem; display: none;
    }
    .result.show { display: block; animation: fadeUp 0.3s ease; }

    .result-label {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--muted); letter-spacing: 0.1em; margin-bottom: 0.75rem;
    }

    .fib-grid {
      display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem;
    }
    .fib-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.4rem 0.75rem;
      font-family: 'Space Mono', monospace; font-size: 0.85rem;
      color: var(--accent); transition: border-color 0.2s;
      animation: popIn 0.3s ease both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    .fib-item:hover { border-color: var(--accent); }

    .fib-sum {
      padding: 1rem; background: rgba(52,211,153,0.06);
      border: 1px solid rgba(52,211,153,0.25); border-radius: 10px;
      text-align: center;
    }
    .fib-sum-label { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 0.3rem; }
    .fib-sum-value { font-size: 1.8rem; font-weight: 800; color: var(--accent); }

    .error {
      color: #f87171; font-size: 0.85rem; margin-top: 0.75rem;
      font-family: 'Space Mono', monospace; display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">MIWEB_GONZALES_SILUPU</span>
    <div class="nav-links">
      <a href="suma.html">Suma</a>
      <a href="factorial.html">Factorial</a>
      <a href="nombre.html">Nombre</a>
      <a href="fibonacci.html" class="active">Fibonacci</a>
    </div>
  </nav>

  <div class="container">
    <div class="tag">04 / SERIES</div>
    <h1>Serie de <span>Fibonacci</span></h1>
    <p class="subtitle">Ingresa cuántos términos quieres generar de la serie (máx. 40).</p>
    <div class="card">
      <div class="input-group">
        <label>CANTIDAD DE TÉRMINOS</label>
        <input type="number" id="num" placeholder="Ej: 10" min="1" max="40" step="1">
      </div>
      <button onclick="calcularFibonacci()">GENERAR SERIE</button>
      <div class="error" id="error">⚠ Ingresa un número entre 1 y 40.</div>
      <div class="result" id="result">
        <div class="result-label">SERIE GENERADA</div>
        <div class="fib-grid" id="fibGrid"></div>
        <div class="fib-sum">
          <div class="fib-sum-label">SUMA TOTAL DE LA SERIE</div>
          <div class="fib-sum-value" id="fibSum"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function calcularFibonacci() {
      const n = parseInt(document.getElementById('num').value);
      const errEl = document.getElementById('error');
      const resEl = document.getElementById('result');
      errEl.classList.remove('show');
      resEl.classList.remove('show');

      if (isNaN(n) || n < 1 || n > 40) {
        errEl.classList.add('show');
        return;
      }

      const serie = [];
      for (let i = 0; i < n; i++) {
        if (i === 0) serie.push(0);
        else if (i === 1) serie.push(1);
        else serie.push(serie[i-1] + serie[i-2]);
      }

      const suma = serie.reduce((a, b) => a + b, 0);
      const grid = document.getElementById('fibGrid');
      grid.innerHTML = '';
      serie.forEach((num, idx) => {
        const el = document.createElement('div');
        el.className = 'fib-item';
        el.style.animationDelay = `${idx * 0.04}s`;
        el.textContent = num;
        grid.appendChild(el);
      });

      document.getElementById('fibSum').textContent = suma.toLocaleString();
      resEl.classList.remove('show');
      void resEl.offsetWidth;
      resEl.classList.add('show');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') calcularFibonacci(); });
  </script>
</body>
</html>
